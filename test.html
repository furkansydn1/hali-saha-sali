<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test</title>
<style>
body{font-family:sans-serif;padding:20px;background:#111;color:#fff}
.ok{color:#4caf50;font-weight:bold}
.err{color:#f44336;font-weight:bold}
.info{color:#2196f3}
button{padding:12px 24px;font-size:1rem;background:#b8f717;color:#000;border:none;border-radius:8px;cursor:pointer;margin:8px 0}
#log{margin-top:20px;padding:14px;background:#1e1e1e;border-radius:8px;font-size:.85rem;line-height:2}
</style>
</head>
<body>
<h2>🔥 Firebase Bağlantı Testi</h2>
<button onclick="testFirebase()">Firebase'i Test Et</button>
<button onclick="testWrite()">Yazma Testi</button>
<button onclick="testRead()">Okuma Testi</button>
<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
function log(msg, type='info'){
  const el = document.getElementById('log');
  const color = type==='ok'?'#4caf50':type==='err'?'#f44336':'#2196f3';
  el.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
}

const config = {
  apiKey: "AIzaSyBc_JhGF0Axeey-pPyUQsV6RZ3UIXd2WIc",
  authDomain: "sali-maci.firebaseapp.com",
  databaseURL: "https://sali-maci-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sali-maci",
  storageBucket: "sali-maci.firebasestorage.app",
  messagingSenderId: "656383692297",
  appId: "1:656383692297:web:ecd81c5645e86e073b72d8"
};

let app, db;

function testFirebase(){
  log('Firebase SDK yükleniyor...');
  try{
    app = firebase.initializeApp(config);
    db = firebase.database();
    log('✅ Firebase başlatıldı!', 'ok');
  } catch(e){
    log('❌ Firebase başlatma hatası: ' + e.message, 'err');
  }
}

async function testWrite(){
  if(!db){ log('Önce Firebase Test butonuna bas!','err'); return; }
  log('Yazma testi başlıyor...');
  try{
    await db.ref('test/ping').set({time: Date.now(), msg: 'merhaba'});
    log('✅ Yazma başarılı!', 'ok');
  } catch(e){
    log('❌ Yazma hatası: ' + e.message, 'err');
  }
}

async function testRead(){
  if(!db){ log('Önce Firebase Test butonuna bas!','err'); return; }
  log('Okuma testi başlıyor...');
  try{
    const snap = await db.ref('test/ping').once('value');
    const val = snap.val();
    if(val){
      log('✅ Okuma başarılı: ' + JSON.stringify(val), 'ok');
    } else {
      log('⚠️ Veri yok ama bağlantı tamam', 'ok');
    }
  } catch(e){
    log('❌ Okuma hatası: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
