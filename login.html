<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch App — Giriş Yap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; font-family: 'DM Sans', sans-serif; background: #020806; color: #e8f5eb; overflow-x: hidden; }

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(10,80,20,.45) 0%, transparent 65%),
    radial-gradient(ellipse 60% 70% at 80% 70%, rgba(5,50,80,.4) 0%, transparent 65%),
    #020806;
}
.bg::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(184,247,23,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,247,23,.025) 1px, transparent 1px);
  background-size: 52px 52px;
  animation: grid-drift 25s linear infinite;
}
@keyframes grid-drift { 0% { background-position: 0 0; } 100% { background-position: 52px 52px; } }

.scan-line {
  position: fixed; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,247,23,.2), transparent);
  animation: scan 8s linear infinite; z-index: 1; pointer-events: none;
}
@keyframes scan { 0% { top: -1px; opacity: 0; } 3% { opacity: 1; } 96% { opacity: 1; } 100% { top: 100vh; opacity: 0; } }

.page {
  position: relative; z-index: 2; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 16px;
}

.brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
.brand-icon { font-size: 2.2rem; margin-bottom: 8px; filter: drop-shadow(0 0 12px rgba(184,247,23,.5)); animation: icon-pulse 3s ease-in-out infinite; }
@keyframes icon-pulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(184,247,23,.4)); } 50% { filter: drop-shadow(0 0 22px rgba(184,247,23,.8)); } }
.brand-title { font-family: 'Bebas Neue', cursive; font-size: 2.6rem; letter-spacing: 6px; color: #b8f717; text-shadow: 0 0 20px rgba(184,247,23,.5), 0 0 60px rgba(184,247,23,.2); line-height: 1; }
.brand-sub { font-size: .63rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(184,247,23,.4); margin-top: 4px; font-weight: 500; }

.card {
  width: 100%; max-width: 420px;
  background: rgba(10,24,12,.65);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(184,247,23,.12); border-radius: 20px;
  padding: 38px 36px 34px;
  box-shadow: 0 0 0 1px rgba(184,247,23,.05), 0 8px 40px rgba(0,0,0,.6);
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
  background: linear-gradient(90deg, transparent, #b8f717, transparent); opacity: .7;
}

.card-heading { text-align: center; margin-bottom: 28px; }
.card-heading h1 { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 4px; color: #e8f5eb; margin-bottom: 5px; }
.card-heading p { font-size: .76rem; color: rgba(184,247,23,.4); letter-spacing: .5px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .65rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(184,247,23,.5); margin-bottom: 7px; }
.input-wrap { position: relative; display: flex; align-items: center; }
.form-input {
  width: 100%; padding: 12px 13px;
  background: rgba(255,255,255,.04); border: 1.5px solid rgba(184,247,23,.1);
  border-radius: 10px; color: #e8f5eb; font-family: 'DM Sans', sans-serif; font-size: .88rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.form-input::placeholder { color: rgba(255,255,255,.2); }
.form-input:focus { border-color: rgba(184,247,23,.45); box-shadow: 0 0 0 3px rgba(184,247,23,.08); }

.pass-toggle { position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: .9rem; opacity: .35; transition: opacity .2s; padding: 4px; color: inherit; }
.pass-toggle:hover { opacity: .8; }

.error-msg { display: none; align-items: center; gap: 8px; background: rgba(255,50,50,.1); border: 1px solid rgba(255,80,80,.25); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: .77rem; color: #ff8080; }
.error-msg.show { display: flex; animation: err-in .3s ease; }
@keyframes err-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.submit-btn { width: 100%; padding: 14px; margin-top: 4px; background: linear-gradient(135deg, #7ab80d, #b8f717); color: #020806; font-family: 'Bebas Neue', cursive; font-size: 1.1rem; letter-spacing: 4px; border: none; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 24px rgba(184,247,23,.3); }
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(184,247,23,.45); }
.submit-btn:active { transform: scale(.97); }
.submit-btn.loading { pointer-events: none; opacity: .7; }
.btn-spinner { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; }
.submit-btn.loading .btn-spinner { display: flex; }
.submit-btn.loading .btn-text { opacity: 0; }
.spinner-ring { width: 20px; height: 20px; border: 2px solid rgba(2,8,6,.3); border-top-color: #020806; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.card-footer { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(184,247,23,.07); }
.card-footer p { font-size: .77rem; color: rgba(255,255,255,.3); }
.card-footer a { color: rgba(184,247,23,.7); text-decoration: none; font-weight: 600; }
.card-footer a:hover { color: #b8f717; }

.sys-info { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: .58rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.12); z-index: 2; white-space: nowrap; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="scan-line"></div>

<div class="page">
  <div class="brand">
    <span class="brand-icon">⚽</span>
    <div class="brand-title">PITCH APP</div>
    <div class="brand-sub">Giriş Yap</div>
  </div>

  <div class="card">
    <div class="card-heading">
      <h1>HOŞ GELDİN</h1>
      <p>Ad soyadın ve şifrenle giriş yap</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <span>⚠️</span><span id="errorText">Hata</span>
    </div>

    <div class="form-group">
      <label>👤 Ad Soyad</label>
      <div class="input-wrap">
        <input class="form-input" type="text" id="nameInput" placeholder="Adın ve soyadın" autocomplete="name">
      </div>
    </div>

    <div class="form-group">
      <label>🔒 Şifre</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="passInput" placeholder="Şifren" autocomplete="current-password" style="padding-right:42px">
        <button class="pass-toggle" id="passToggle" type="button">👁️</button>
      </div>
    </div>

    <button class="submit-btn" id="loginBtn">
      <span class="btn-text">Giriş Yap</span>
      <span class="btn-spinner"><span class="spinner-ring"></span></span>
    </button>

    <div class="card-footer">
      <p>Hesabın yok mu? <a href="register.html">Kayıt Ol</a></p>
    </div>
  </div>
</div>

<div class="sys-info">Pitch App · Güvenli Giriş</div>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyBc_JhGF0Axeey-pPyUQsV6RZ3UIXd2WIc",
  authDomain:        "sali-maci.firebaseapp.com",
  databaseURL:       "https://sali-maci-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "sali-maci",
  storageBucket:     "sali-maci.appspot.com",
  messagingSenderId: "656383692297",
  appId:             "1:656383692297:web:ecd81c5645e86e073b72d8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const nameInput = document.getElementById('nameInput');
const passInput = document.getElementById('passInput');
const passToggle = document.getElementById('passToggle');
const loginBtn  = document.getElementById('loginBtn');
const errorMsg  = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');

// Zaten giriş yapmışsa direkt lobby'ye gönder
(function() {
  var raw = localStorage.getItem('hs_session') || localStorage.getItem('hs_session_temp');
  if (!raw) return;
  try {
    var s = JSON.parse(raw);
    if (s && s.id) { window.location.replace('lobby.html'); }
  } catch(e) {}
})();

function showError(msg) { errorText.textContent = msg; errorMsg.classList.add('show'); }
function hideError()    { errorMsg.classList.remove('show'); }

passToggle.addEventListener('click', function() {
  var show = passInput.type === 'password';
  passInput.type = show ? 'text' : 'password';
  passToggle.textContent = show ? '🙈' : '👁️';
});

[nameInput, passInput].forEach(function(el) {
  el.addEventListener('input', hideError);
  el.addEventListener('keydown', function(e) { if (e.key === 'Enter') loginBtn.click(); });
});

loginBtn.addEventListener('click', async function() {
  hideError();
  var fullName = nameInput.value.trim();
  var pass     = passInput.value;

  if (!fullName) { showError('Ad Soyad gir.'); nameInput.focus(); return; }
  if (!pass)     { showError('Şifre gir.'); passInput.focus(); return; }

  loginBtn.classList.add('loading');

  try {
    var dbKey = fullName.toLowerCase();
    var snap  = await db.ref('users').once('value');
    var users = snap.val() || {};

    // Boşluklu ve alt çizgili her iki formatta ara
    var userData = users[dbKey] || users[dbKey.replace(/ /g, '_')];

    if (!userData) {
      loginBtn.classList.remove('loading');
      showError('Kullanıcı bulunamadı. Kayıt oldun mu?');
      return;
    }

    if (userData.pass !== pass) {
      loginBtn.classList.remove('loading');
      showError('Şifre yanlış.');
      passInput.value = '';
      passInput.focus();
      return;
    }

    // Başarılı giriş — session kaydet
    localStorage.setItem('hs_session', JSON.stringify({
      id:     userData.id,
      name:   userData.name,
      dbKey:  dbKey
    }));

    window.location.href = 'lobby.html';

  } catch(err) {
    loginBtn.classList.remove('loading');
    showError('Bağlantı hatası: ' + (err.message || 'Bilinmeyen hata'));
    console.error('Login hatası:', err);
  }
});
</script>
</body>
</html>
