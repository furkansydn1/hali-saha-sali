<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch App — Giriş Yap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; font-family: 'DM Sans', sans-serif; background: #020806; color: #e8f5eb; overflow-x: hidden; }

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(10,80,20,.45) 0%, transparent 65%),
    radial-gradient(ellipse 60% 70% at 80% 70%, rgba(5,50,80,.4) 0%, transparent 65%),
    #020806;
}
.bg::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(184,247,23,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,247,23,.025) 1px, transparent 1px);
  background-size: 52px 52px;
  animation: grid-drift 25s linear infinite;
}
@keyframes grid-drift { 0% { background-position: 0 0; } 100% { background-position: 52px 52px; } }
.bg::after {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(circle 180px at 15% 20%, rgba(80,255,80,.04) 0%, transparent 100%),
    radial-gradient(circle 200px at 75% 80%, rgba(80,255,80,.03) 0%, transparent 100%);
  animation: orb-shift 18s ease-in-out infinite alternate;
}
@keyframes orb-shift { 0% { opacity: .6; } 100% { opacity: 1; } }

.scan-line {
  position: fixed; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,247,23,.2), transparent);
  animation: scan 8s linear infinite; z-index: 1; pointer-events: none;
}
@keyframes scan { 0% { top: -1px; opacity: 0; } 3% { opacity: 1; } 96% { opacity: 1; } 100% { top: 100vh; opacity: 0; } }

.page {
  position: relative; z-index: 2; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 16px;
}

.brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
.brand-icon { font-size: 2.4rem; margin-bottom: 10px; filter: drop-shadow(0 0 12px rgba(184,247,23,.5)); animation: icon-pulse 3s ease-in-out infinite; }
@keyframes icon-pulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(184,247,23,.4)); } 50% { filter: drop-shadow(0 0 22px rgba(184,247,23,.8)); } }
.brand-title { font-family: 'Bebas Neue', cursive; font-size: 2.8rem; letter-spacing: 6px; color: #b8f717; text-shadow: 0 0 20px rgba(184,247,23,.5), 0 0 60px rgba(184,247,23,.2); line-height: 1; }
.brand-sub { font-size: .65rem; letter-spacing: 4px; text-transform: uppercase; color: rgba(184,247,23,.4); margin-top: 4px; font-weight: 500; }

.card {
  width: 100%; max-width: 420px;
  background: rgba(10,24,12,.65);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(184,247,23,.12); border-radius: 20px;
  padding: 40px 36px 36px;
  box-shadow: 0 0 0 1px rgba(184,247,23,.05), 0 8px 40px rgba(0,0,0,.6), 0 0 80px rgba(184,247,23,.04) inset;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
  background: linear-gradient(90deg, transparent, #b8f717, transparent); opacity: .7;
}

.card-heading { text-align: center; margin-bottom: 30px; }
.card-heading h1 { font-family: 'Bebas Neue', cursive; font-size: 1.7rem; letter-spacing: 4px; color: #e8f5eb; margin-bottom: 6px; }
.card-heading p { font-size: .78rem; color: rgba(184,247,23,.4); letter-spacing: 1px; }

.form-group { margin-bottom: 16px; position: relative; }
.form-group label { display: block; font-size: .65rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(184,247,23,.5); margin-bottom: 7px; }
.input-wrap { position: relative; display: flex; align-items: center; }
.input-icon { position: absolute; left: 13px; font-size: .95rem; opacity: .4; pointer-events: none; transition: opacity .2s; }
.form-group:focus-within .input-icon { opacity: .85; }
.form-input {
  width: 100%; padding: 13px 13px 13px 40px;
  background: rgba(255,255,255,.04); border: 1.5px solid rgba(184,247,23,.1);
  border-radius: 10px; color: #e8f5eb; font-family: 'DM Sans', sans-serif; font-size: .9rem; outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.form-input::placeholder { color: rgba(255,255,255,.2); }
.form-input:focus { border-color: rgba(184,247,23,.45); background: rgba(184,247,23,.04); box-shadow: 0 0 0 3px rgba(184,247,23,.08); }

.pass-toggle { position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: .9rem; opacity: .35; transition: opacity .2s; padding: 4px; color: inherit; }
.pass-toggle:hover { opacity: .8; }

.error-msg {
  display: none; align-items: center; gap: 8px;
  background: rgba(255,50,50,.1); border: 1px solid rgba(255,80,80,.25);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: .78rem; color: #ff8080;
}
.error-msg.show { display: flex; animation: err-in .3s cubic-bezier(.34,1.56,.64,1); }
@keyframes err-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.submit-btn {
  width: 100%; padding: 14px; margin-top: 6px;
  background: linear-gradient(135deg, #7ab80d, #b8f717); color: #020806;
  font-family: 'Bebas Neue', cursive; font-size: 1.15rem; letter-spacing: 4px;
  border: none; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, filter .2s;
  box-shadow: 0 4px 24px rgba(184,247,23,.3);
}
.submit-btn:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 32px rgba(184,247,23,.45); filter: brightness(1.08); }
.submit-btn:active { transform: scale(.97); }
.submit-btn.loading { pointer-events: none; filter: brightness(.7); }
.submit-btn .btn-text { transition: opacity .2s; }
.submit-btn.loading .btn-text { opacity: 0; }
.btn-spinner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.submit-btn.loading .btn-spinner { opacity: 1; }
.spinner-ring { width: 20px; height: 20px; border: 2px solid rgba(2,8,6,.3); border-top-color: #020806; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.card-footer { text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(184,247,23,.07); }
.card-footer p { font-size: .78rem; color: rgba(255,255,255,.3); }
.card-footer a { color: rgba(184,247,23,.7); text-decoration: none; font-weight: 600; transition: color .2s; }
.card-footer a:hover { color: #b8f717; text-shadow: 0 0 10px rgba(184,247,23,.4); }

.sys-info { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: .58rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.12); z-index: 2; white-space: nowrap; }

.success-overlay { position: fixed; inset: 0; background: rgba(184,247,23,.06); z-index: 100; display: none; align-items: center; justify-content: center; }
.success-overlay.show { display: flex; }
.success-content { text-align: center; }
.s-icon { font-size: 3rem; display: block; margin-bottom: 12px; animation: bounce-in .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes bounce-in { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.s-text { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; letter-spacing: 4px; color: #b8f717; text-shadow: 0 0 20px rgba(184,247,23,.6); }
.s-sub { font-size: .75rem; color: rgba(184,247,23,.5); margin-top: 6px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="scan-line"></div>

<div class="success-overlay" id="successOverlay">
  <div class="success-content">
    <span class="s-icon">✅</span>
    <div class="s-text">Giriş Başarılı</div>
    <div class="s-sub" id="successSub">Lobiye yönlendiriliyorsun...</div>
  </div>
</div>

<div class="page">
  <div class="brand">
    <div class="brand-icon">⚽</div>
    <div class="brand-title">Pitch App</div>
    <div class="brand-sub">Halı Saha Organizasyon Platformu</div>
  </div>

  <div class="card">
    <div class="card-heading">
      <h1>Giriş Yap</h1>
      <p>Kayıtlı ad soyadın ve şifrenle giriş yap</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <span>⚠️</span>
      <span id="errorText">Hata oluştu.</span>
    </div>

    <!-- Tek input: Kayıtlı Ad Soyad -->
    <div class="form-group">
      <label>Kayıtlı Ad Soyad</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          type="text"
          id="nameInput"
          class="form-input"
          placeholder="Örn: Ahmet Yılmaz"
          autocomplete="name"
        >
      </div>
    </div>

    <!-- Şifre -->
    <div class="form-group">
      <label>Şifre</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          type="password"
          id="passInput"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
        >
        <button class="pass-toggle" id="passToggle" type="button">👁️</button>
      </div>
    </div>

    <button class="submit-btn" id="loginBtn" type="button">
      <span class="btn-text">Giriş Yap</span>
      <span class="btn-spinner"><span class="spinner-ring"></span></span>
    </button>

    <div class="card-footer">
      <p>Hesabın yok mu? <a href="register.html">Kayıt Ol</a></p>
    </div>
  </div>
</div>

<div class="sys-info">Pitch App · Güvenli Bağlantı</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, child } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBc_JhGF0Axeey-pPyUQsV6RZ3UIXd2WIc",
  authDomain:        "sali-maci.firebaseapp.com",
  databaseURL:       "https://sali-maci-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "sali-maci",
  storageBucket:     "sali-maci.appspot.com",
  messagingSenderId: "874498878352",
  appId:             "1:874498878352:web:abc123"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const nameInput      = document.getElementById('nameInput');
const passInput      = document.getElementById('passInput');
const passToggle     = document.getElementById('passToggle');
const loginBtn       = document.getElementById('loginBtn');
const errorMsg       = document.getElementById('errorMsg');
const errorText      = document.getElementById('errorText');
const successOverlay = document.getElementById('successOverlay');
const successSub     = document.getElementById('successSub');

passToggle.addEventListener('click', () => {
  const show = passInput.type === 'password';
  passInput.type = show ? 'text' : 'password';
  passToggle.textContent = show ? '🙈' : '👁️';
});

function showError(msg) { errorText.textContent = msg; errorMsg.classList.add('show'); }
function hideError()    { errorMsg.classList.remove('show'); }

[nameInput, passInput].forEach(el => {
  el.addEventListener('input', hideError);
  el.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
});

loginBtn.addEventListener('click', async () => {
  hideError();

  const fullName = nameInput.value.trim();
  const pass     = passInput.value;

  if (!fullName) { showError('Lütfen kayıtlı ad soyadını gir.'); nameInput.focus(); return; }
  if (!pass)     { showError('Lütfen şifreni gir.'); passInput.focus(); return; }

  loginBtn.classList.add('loading');

  const nameLower = fullName.toLowerCase();

  /*
   * Eski index.html sistemi anahtarı "ahmet yılmaz" (boşluklu) şeklinde kaydediyor.
   * Yeni register.html sistemi "ahmet_yılmaz" (alt çizgili) şeklinde kaydediyor.
   * Her iki formatta da arıyoruz — hangisi bulunursa o hesapla giriş yapılır.
   */
  const keyWithSpace     = nameLower;                          // eski format: "ahmet yılmaz"
  const keyWithUnderscore = nameLower.replace(/ /g, '_');     // yeni format: "ahmet_yılmaz"

  try {
    const dbRef = ref(db);

    // Önce boşluklu format dene (eski hesaplar)
    let snapshot = await get(child(dbRef, `users/${keyWithSpace}`));

    // Bulunamazsa alt çizgili format dene (yeni hesaplar)
    if (!snapshot.exists()) {
      snapshot = await get(child(dbRef, `users/${keyWithUnderscore}`));
    }

    if (!snapshot.exists()) {
      loginBtn.classList.remove('loading');
      showError('Bu isimle kayıtlı kullanıcı bulunamadı. Adını kontrol et.');
      return;
    }

    const user = snapshot.val();

    if (user.pass !== pass) {
      loginBtn.classList.remove('loading');
      showError('Şifre yanlış. Tekrar dene.');
      passInput.select();
      return;
    }

    // Başarılı giriş — session mevcut index.html formatıyla uyumlu
    localStorage.setItem('hs_session', JSON.stringify({ id: user.id, name: user.name }));

    const mode      = user.mode || 'classic';
    const modeLabel = mode === 'tournament' ? 'Hastane Turnuvası' : 'Pitch App Klasik';
    successSub.textContent = modeLabel + ' · Lobiye yönlendiriliyorsun...';
    successOverlay.classList.add('show');

    setTimeout(() => { window.location.href = 'lobby.html'; }, 900);

  } catch (err) {
    loginBtn.classList.remove('loading');
    console.error('Firebase Error:', err);
    showError('Bağlantı hatası. İnternet bağlantını kontrol et.');
  }
});
</script>
</body>
</html>
